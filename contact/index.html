<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contactpagina van Kay Justus voor samenwerkingen, redactionele vragen en professionele aanvragen."
    />
    <title>Contact | Kay Justus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="page header-inner">
        <a class="brand" href="/" aria-label="Naar homepage">Kay Justus</a>
        <nav class="main-nav" aria-label="Hoofdnavigatie">
          <a href="/">Home</a>
          <a href="/#writings">Writings</a>
          <a href="/#about">About</a>
        </nav>
        <a class="header-contact" href="/contact" aria-current="page">Contact</a>
      </div>
    </header>

    <main class="page">
      <section class="contact-layout" aria-labelledby="contact-title">
        <div class="contact-intro">
          <p class="eyebrow">Contact</p>
          <h1 id="contact-title">Contact</h1>
          <p class="contact-lead">Voor samenwerkingen, vragen of ideeën — stuur gerust een bericht.</p>
          <p class="contact-note">Ik lees alles zelf en probeer zo snel mogelijk te reageren.</p>
        </div>

        <div class="contact-form-shell" aria-live="polite">
          <form id="contact-form" class="contact-form" novalidate>
            <label for="name">Naam</label>
            <input id="name" name="name" type="text" required autocomplete="name" />

            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" required autocomplete="email" />

            <label for="message">Bericht</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit" class="button button-primary">Verstuur bericht</button>
            <p id="form-message" class="form-feedback" hidden></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> Kay Justus. Alle rechten voorbehouden.</p>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const form = document.getElementById('contact-form');
      const feedback = document.getElementById('form-message');

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        if (!form.checkValidity()) {
          feedback.hidden = false;
          feedback.textContent = 'Controleer of alle verplichte velden zijn ingevuld.';
          feedback.classList.add('is-error');
          feedback.classList.remove('is-success');
          form.reportValidity();
          return;
        }

        feedback.hidden = false;
        feedback.textContent = 'Bericht verzonden. Ik neem snel contact op.';
        feedback.classList.add('is-success');
        feedback.classList.remove('is-error');
        form.reset();
      });
    </script>
  </body>
</html>
